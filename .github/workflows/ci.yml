name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (errors block, warnings tracked)
        run: npx eslint src/ --max-warnings=999

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: Test
        run: npx vitest run

      - name: Test coverage
        run: npx vitest run --coverage
        continue-on-error: true # カバレッジ閾値未達でも CI は通す（段階的に厳格化）

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true # 既存の moderate 脆弱性は許容
